<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sessions{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    ink: { 50: '#f7f5f2', 100: '#ece8e1', 200: '#d9d1c5', 300: '#c2b5a3', 400: '#a89680', 500: '#8f7a63', 600: '#7a6553', 700: '#635145', 800: '#1e1b18', 900: '#15130f', 950: '#0d0c0a' },
                    copper: { 400: '#d4845a', 500: '#c27141', 600: '#a85e35' },
                    sage: { 400: '#7a9e7e', 500: '#5f8563', 600: '#4a6b4e' },
                },
                fontFamily: {
                    display: ['Playfair Display', 'Georgia', 'serif'],
                    body: ['DM Sans', 'system-ui', 'sans-serif'],
                    mono: ['JetBrains Mono', 'Menlo', 'monospace'],
                },
            }
        }
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: 'DM Sans', system-ui, sans-serif; }
        .truncate-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* Staggered entrance */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .fade-up:nth-child(1) { animation-delay: 0.03s; }
        .fade-up:nth-child(2) { animation-delay: 0.06s; }
        .fade-up:nth-child(3) { animation-delay: 0.09s; }
        .fade-up:nth-child(4) { animation-delay: 0.12s; }
        .fade-up:nth-child(5) { animation-delay: 0.15s; }
        .fade-up:nth-child(6) { animation-delay: 0.18s; }
        .fade-up:nth-child(7) { animation-delay: 0.21s; }
        .fade-up:nth-child(8) { animation-delay: 0.24s; }

        /* Session entry hover */
        .session-entry {
            transition: background 0.2s ease, border-color 0.2s ease;
        }
        .session-entry:hover {
            background: rgba(212, 132, 90, 0.04);
        }

        /* Markdown */
        .md-content { word-break: break-word; line-height: 1.7; }
        .md-content p { margin-bottom: 0.6em; }
        .md-content h1, .md-content h2, .md-content h3 {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 600; margin-top: 1.2em; margin-bottom: 0.4em;
            color: #ece8e1;
        }
        .md-content h1 { font-size: 1.3em; }
        .md-content h2 { font-size: 1.15em; }
        .md-content h3 { font-size: 1.05em; }
        .md-content ul, .md-content ol { margin-left: 1.5em; margin-bottom: 0.6em; }
        .md-content ul { list-style-type: disc; }
        .md-content ol { list-style-type: decimal; }
        .md-content li { margin-bottom: 0.25em; }
        .md-content code {
            background: rgba(212, 132, 90, 0.12);
            color: #d4845a;
            padding: 0.15em 0.45em; border-radius: 3px; font-size: 0.88em;
            font-family: 'JetBrains Mono', monospace;
        }
        .md-content pre {
            background: #0d0c0a; padding: 1em; border-radius: 4px;
            overflow-x: auto; margin: 0.75em 0;
            border-left: 2px solid rgba(212, 132, 90, 0.3);
        }
        .md-content pre code { background: none; padding: 0; color: #c2b5a3; }
        .md-content table { border-collapse: collapse; width: 100%; margin: 0.75em 0; }
        .md-content th, .md-content td { border: 1px solid #2a2520; padding: 0.5em 0.75em; text-align: left; }
        .md-content th { background: rgba(212, 132, 90, 0.08); font-weight: 600; color: #d9d1c5; }
        .md-content blockquote { border-left: 2px solid #7a6553; padding-left: 1em; margin: 0.6em 0; color: #a89680; font-style: italic; }
        .md-content a { color: #d4845a; text-decoration: underline; text-underline-offset: 2px; }
        .md-content hr { border-color: #2a2520; margin: 1.2em 0; }
        .md-content strong { color: #ece8e1; }

        /* Star */
        .star-btn { cursor: pointer; transition: transform 0.15s, color 0.15s; color: #635145; }
        .star-btn:hover { transform: scale(1.15); color: #d4845a; }
        .star-btn.active { color: #d4845a; }

        /* Active indicator */
        @keyframes gentlePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .live-dot { animation: gentlePulse 2s ease-in-out infinite; }

        /* ===== LIGHT MODE ===== */
        html:not(.dark) body { background: #f7f5f2; color: #1e1b18; }
        html:not(.dark) nav { border-color: #ece8e1; }
        html:not(.dark) .text-ink-50 { color: #15130f; }
        html:not(.dark) .text-ink-100 { color: #1e1b18; }
        html:not(.dark) .text-ink-200 { color: #3a342c; }
        html:not(.dark) .text-ink-300 { color: #4a4238; }
        html:not(.dark) .text-ink-400 { color: #635145; }
        html:not(.dark) .text-ink-500 { color: #8f7a63; }
        html:not(.dark) .text-ink-600 { color: #a89680; }
        html:not(.dark) .text-ink-700 { color: #c2b5a3; }
        html:not(.dark) .bg-ink-950 { background: #f7f5f2; }
        html:not(.dark) .bg-ink-800 { background: #ece8e1; }
        html:not(.dark) .bg-ink-700 { background: #d9d1c5; }
        html:not(.dark) .border-ink-800\/40, html:not(.dark) .border-ink-800\/30 { border-color: rgba(30,27,24,0.08); }
        html:not(.dark) .border-ink-700\/50 { border-color: rgba(30,27,24,0.12); }
        html:not(.dark) .border-copper-500\/15 { border-color: rgba(194,113,65,0.2); }
        html:not(.dark) .session-entry:hover { background: rgba(212,132,90,0.06); }
        html:not(.dark) .bg-copper-500\/15 { background: rgba(194,113,65,0.08); }
        html:not(.dark) .bg-copper-500\/10 { background: rgba(194,113,65,0.08); }
        html:not(.dark) .star-btn { color: #c2b5a3; }
        html:not(.dark) .star-btn:hover, html:not(.dark) .star-btn.active { color: #c27141; }
        html:not(.dark) #toast { background: #1e1b18; color: #f7f5f2; border-color: #3a342c; }

        /* Light mode markdown */
        html:not(.dark) .md-content code { background: rgba(194,113,65,0.1); color: #a85e35; }
        html:not(.dark) .md-content pre { background: #ece8e1; border-left-color: rgba(194,113,65,0.3); }
        html:not(.dark) .md-content pre code { color: #3a342c; }
        html:not(.dark) .md-content th { background: rgba(194,113,65,0.06); color: #1e1b18; }
        html:not(.dark) .md-content th, html:not(.dark) .md-content td { border-color: #d9d1c5; }
        html:not(.dark) .md-content strong { color: #15130f; }
        html:not(.dark) .md-content h1, html:not(.dark) .md-content h2, html:not(.dark) .md-content h3 { color: #15130f; }
        html:not(.dark) .md-content blockquote { border-color: #c2b5a3; color: #635145; }
        html:not(.dark) .md-content a { color: #a85e35; }
        html:not(.dark) .md-content hr { border-color: #d9d1c5; }

        /* Light mode bubbles */
        html:not(.dark) .bg-\[\#1f1d19\] { background: #f0ebe4 !important; }
        html:not(.dark) .border-\[\#2e2a24\] { border-color: #d9d1c5 !important; }
        html:not(.dark) .text-\[\#c8bfb3\] { color: #3a342c !important; }
        html:not(.dark) .bg-copper-500\/8 { background: rgba(194,113,65,0.06) !important; }
        html:not(.dark) .border-copper-500\/12 { border-color: rgba(194,113,65,0.15) !important; }
        html:not(.dark) .border-copper-500\/20 { border-color: rgba(194,113,65,0.2) !important; }
        html:not(.dark) .bg-copper-500\/12 { background: rgba(194,113,65,0.08) !important; }
        html:not(.dark) .bg-ink-700\/60 { background: #ece8e1 !important; }
        html:not(.dark) .border-ink-600\/30 { border-color: #d9d1c5 !important; }

        /* Light scrollbar */
        html:not(.dark) ::-webkit-scrollbar-track { background: #f7f5f2; }
        html:not(.dark) ::-webkit-scrollbar-thumb { background: #d9d1c5; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #15130f; }
        ::-webkit-scrollbar-thumb { background: #3a342c; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #4a4238; }

        /* Toast */
        .toast {
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* Buttons */
        .btn-action {
            display: inline-flex; align-items: center; gap: 0.4em;
            font-size: 0.75rem; font-weight: 500;
            padding: 0.4em 0.85em;
            border-radius: 6px;
            border: 1px solid rgba(99,81,69,0.3);
            color: #a89680;
            background: transparent;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            text-decoration: none;
            white-space: nowrap;
        }
        .btn-action:hover {
            color: #d4845a;
            border-color: rgba(212,132,90,0.35);
            background: rgba(212,132,90,0.06);
            transform: translateY(-1px);
        }
        .btn-action:active { transform: translateY(0); }
        .btn-action.btn-primary {
            background: rgba(212,132,90,0.1);
            border-color: rgba(212,132,90,0.3);
            color: #d4845a;
        }
        .btn-action.btn-primary:hover {
            background: rgba(212,132,90,0.18);
            border-color: rgba(212,132,90,0.5);
        }
        /* Light mode buttons */
        html:not(.dark) .btn-action {
            border-color: rgba(30,27,24,0.12);
            color: #635145;
        }
        html:not(.dark) .btn-action:hover {
            color: #a85e35;
            border-color: rgba(168,94,53,0.3);
            background: rgba(168,94,53,0.06);
        }
        html:not(.dark) .btn-action.btn-primary {
            background: rgba(168,94,53,0.08);
            border-color: rgba(168,94,53,0.25);
            color: #a85e35;
        }

        /* Nav active state */
        .nav-link { position: relative; }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 50%; width: 0; height: 1.5px;
            background: #d4845a;
            transition: all 0.2s ease;
            transform: translateX(-50%);
        }
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }
    </style>
</head>
<body class="bg-ink-950 text-ink-200 min-h-screen flex flex-col">
    <!-- Nav -->
    <nav class="border-b border-ink-800/60">
        <div class="max-w-6xl mx-auto px-6 lg:px-8">
            <div class="flex items-center justify-between h-14">
                <div class="flex items-center gap-10">
                    <a href="/" class="font-display text-lg font-semibold text-ink-100 tracking-tight">Claude Desk</a>
                    <div class="flex items-center gap-6">
                        <a href="/" class="nav-link text-ink-400 hover:text-ink-100 text-sm font-medium transition-colors" id="nav-dashboard">Dashboard</a>
                        <a href="/timeline" class="nav-link text-ink-400 hover:text-ink-100 text-sm font-medium transition-colors" id="nav-timeline">Timeline</a>
                        <a href="/sessions" class="nav-link text-ink-400 hover:text-ink-100 text-sm font-medium transition-colors" id="nav-sessions">Sessions</a>
                        <a href="/artifacts" class="nav-link text-ink-400 hover:text-ink-100 text-sm font-medium transition-colors" id="nav-artifacts">Artifacts</a>
                        <a href="/insights" class="nav-link text-ink-400 hover:text-ink-100 text-sm font-medium transition-colors" id="nav-insights">Insights</a>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <form action="/sessions" method="get" class="flex items-center">
                        <input type="text" name="q" placeholder="Search..."
                               class="bg-transparent text-ink-200 placeholder-ink-500 px-3 py-1.5 text-sm border border-ink-700/50 rounded-md w-48 focus:outline-none focus:border-copper-500/60 focus:w-64 transition-all">
                    </form>
                    <button onclick="toggleTheme()" id="theme-toggle" class="text-ink-500 hover:text-copper-400 transition-colors text-sm" title="Toggle light/dark">
                        <span id="theme-icon">&#9790;</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto w-full px-6 lg:px-8 py-10 flex-1">
        {% block content %}{% endblock %}
    </main>

    <!-- Toast notification -->
    <div id="toast" class="toast fixed bottom-6 right-6 bg-ink-800 text-ink-100 px-4 py-2.5 rounded-md text-sm border border-ink-700/50 shadow-xl pointer-events-none"></div>

    <script>
    // Theme
    function toggleTheme() {
        const html = document.documentElement;
        const isDark = html.classList.contains('dark');
        html.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
        document.getElementById('theme-icon').textContent = isDark ? '\u2600' : '\u263E';
    }
    // Restore saved theme
    (function() {
        const saved = localStorage.getItem('theme');
        if (saved === 'light') {
            document.documentElement.classList.remove('dark');
            document.addEventListener('DOMContentLoaded', () => {
                document.getElementById('theme-icon').textContent = '\u2600';
            });
        }
    })();

    // Markdown rendering
    document.addEventListener('DOMContentLoaded', () => {
        marked.setOptions({ breaks: true, gfm: true });
        document.querySelectorAll('.md-render').forEach(el => {
            const raw = el.textContent;
            el.innerHTML = marked.parse(raw);
            el.classList.add('md-content');
        });

        // Highlight active nav
        const path = window.location.pathname;
        const navMap = { '/': 'nav-dashboard', '/timeline': 'nav-timeline', '/sessions': 'nav-sessions', '/artifacts': 'nav-artifacts', '/insights': 'nav-insights' };
        for (const [prefix, id] of Object.entries(navMap)) {
            if (path === prefix || (prefix !== '/' && path.startsWith(prefix))) {
                document.getElementById(id)?.classList.add('active', 'text-ink-100');
            }
        }
    });

    // Toast
    function showToast(text) {
        const t = document.getElementById('toast');
        t.textContent = text;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2200);
    }

    // Favorites
    async function toggleFav(sessionId, btn) {
        const res = await fetch(`/api/favorites/${sessionId}/toggle`, { method: 'POST' });
        const data = await res.json();
        btn.classList.toggle('active', data.favorited);
        btn.textContent = data.favorited ? '\u2605' : '\u2606';
        showToast(data.favorited ? 'Starred' : 'Unstarred');
    }

    // Resume — opens Terminal and runs the command
    function copyResume(id) {
        fetch(`/api/resume/${id}`, { method: 'POST' })
            .then(r => r.json())
            .then(data => {
                if (data.ok) showToast('Opening in Terminal...');
                else showToast('Failed to open terminal');
            })
            .catch(() => {
                // Fallback: copy to clipboard
                navigator.clipboard.writeText(`claude --resume ${id}`).then(() => showToast('Resume command copied'));
            });
    }
    </script>
</body>
</html>
